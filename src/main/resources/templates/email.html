<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <title>Email</title>
</head>
<body style="margin:0;padding:0;background-color:#F5F5F7;font-family:Arial,Helvetica,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#F5F5F7;padding:30px 0;">
    <tr>
        <td align="center">
            <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,0.10);">
                <!-- Header -->
                <tr>
                    <td style="background-color:#7B2FFF;padding:24px 30px;text-align:center;">
                        <img alt="Cinos" height="48" style="display:block;margin:0 auto 10px;" src="cid:cinos-logo"/>
                        <h1 style="color:#ffffff;margin:0;font-size:20px;font-weight:700;">CINOS Automotores</h1>
                    </td>
                </tr>
                <!-- Body -->
                <tr>
                    <td style="padding:32px 30px;">
                        <p style="color:#1A1A2E;font-size:14px;line-height:1.6;margin:0;" th:utext="${message}"></p>
                    </td>
                </tr>
                <!-- Footer -->
                <tr>
                    <td style="padding:20px 30px;border-top:1px solid #E0E0E6;text-align:center;">
                        <p style="color:#9899A6;font-size:12px;margin:0;">Este es un email automatico generado por CINOS Automotores. No responder a este mensaje.</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
